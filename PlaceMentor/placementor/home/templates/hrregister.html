{% extends 'base.html' %}
{% load static %}

{% block title %}HR Registration | PlaceMentor{% endblock %}

{% block content %}
<div class="container py-5 animate__animated animate__zoomIn">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card bg-dark2 border border-secondary border-opacity-10 p-4 p-md-5 rounded-4 shadow-lg">
        <div class="text-center mb-5">
          <div class="logo-icon mx-auto mb-4 bg-gold-soft text-gold"
            style="width: 50px; height: 50px; font-size: 1.2rem;">PC</div>
          <h1 class="fw-bold text-light mb-1">HR <span class="text-gold">Registration</span></h1>
          <p class="text-muted">Start hiring the best talent from Excellence College.</p>
        </div>

        <form method="POST">
          {% csrf_token %}
          <div class="row g-4 mb-4">
            <div class="col-md-6 text-start">
              <label class="form-label text-muted small text-uppercase fw-bold">Full Name</label>
              <input type="text" name="fullname"
                class="form-control bg-dark border-secondary border-opacity-25 text-light py-2"
                value="{{ fullname|default:'' }}" placeholder="Recruiter Name" required>
            </div>
            <div class="col-md-6 text-start">
              <label class="form-label text-muted small text-uppercase fw-bold">Company Name</label>
              <input type="text" name="company"
                class="form-control bg-dark border-secondary border-opacity-25 text-light py-2"
                value="{{ company|default:'' }}" placeholder="e.g. Google, Microsoft" required>
            </div>
          </div>

          <div class="row g-4 mb-4">
            <div class="col-md-6 text-start">
              <label class="form-label text-muted small text-uppercase fw-bold">Official Email</label>
              <input type="email" name="email"
                class="form-control bg-dark border-secondary border-opacity-25 text-light py-2"
                value="{{ email|default:'' }}" placeholder="hr@company.com" required>
            </div>
            <div class="col-md-6 text-start">
              <label class="form-label text-muted small text-uppercase fw-bold">Contact Number</label>
              <input type="text" name="phone"
                class="form-control bg-dark border-secondary border-opacity-25 text-light py-2"
                value="{{ phone|default:'' }}" placeholder="Phone number" required>
            </div>
          </div>

          <div class="mb-4 text-start">
            <label class="form-label text-muted small text-uppercase fw-bold">Choose Username</label>
            <input type="text" name="username"
              class="form-control bg-dark border-secondary border-opacity-25 text-light py-2"
              value="{{ username|default:'' }}" placeholder="Username for login" required>
          </div>

          <div class="row g-4 mb-5">
            <div class="col-md-6 text-start">
              <label class="form-label text-muted small text-uppercase fw-bold">Password</label>
              <input type="password" name="password"
                class="form-control bg-dark border-secondary border-opacity-25 text-light py-2"
                placeholder="Min. 8 characters" required>
            </div>
            <div class="col-md-6 text-start">
              <label class="form-label text-muted small text-uppercase fw-bold">Confirm Password</label>
              <input type="password" name="password2"
                class="form-control bg-dark border-secondary border-opacity-25 text-light py-2"
                placeholder="Repeat password" required>
            </div>
          </div>

          <button type="submit" class="btn btn-hr w-100 py-3 fw-bold fs-5 mb-4">Register As Recruiter</button>

          <div class="text-center text-muted small">
            Already have an HR account? <a href="{% url 'hrlogin' %}" class="text-gold text-decoration-none">Login
              here</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<style>
  .bg-gold-soft {
    background: rgba(245, 166, 35, 0.1);
  }
</style>
{% endblock %}
