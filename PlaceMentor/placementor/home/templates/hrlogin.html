{% extends 'base.html' %}
{% load static %}

{% block title %}HR Login | PlaceMentor{% endblock %}

{% block content %}
<div class="container py-5 animate__animated animate__zoomIn">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card bg-dark2 border border-secondary border-opacity-10 p-4 p-md-5 rounded-4 shadow-lg text-center">
        <div class="logo-icon mx-auto mb-4 bg-gold-soft text-gold"
          style="width: 60px; height: 60px; font-size: 1.5rem;">PC</div>
        <h1 class="fw-bold text-light mb-1">HR <span class="text-gold">Login</span></h1>
        <p class="text-muted mb-5">Access your recruitment command center.</p>

        <form method="POST">
          {% csrf_token %}
          <div class="mb-4 text-start">
            <label class="form-label text-muted small text-uppercase fw-bold">Username</label>
            <input type="text" name="username"
              class="form-control bg-dark border-secondary border-opacity-25 text-light py-3 font-outfit"
              placeholder="Enter HR username" required>
          </div>
          <div class="mb-5 text-start">
            <label class="form-label text-muted small text-uppercase fw-bold">Password</label>
            <input type="password" name="password"
              class="form-control bg-dark border-secondary border-opacity-25 text-light py-3" placeholder="••••••••"
              required>
          </div>
          <button type="submit" class="btn btn-hr w-100 py-3 fw-bold fs-5">Login As HR</button>

          <div class="mt-4 text-muted small">
            Don't have an HR account? <a href="{% url 'hrregister' %}" class="text-gold text-decoration-none">Register
              here</a>
          </div>
        </form>
      </div>

      <div class="text-center mt-5">
        <p class="text-muted small">Are you a student? <a href="{% url 'studlogin' %}"
            class="text-teal text-decoration-none fw-bold">Student Login</a></p>
      </div>
    </div>
  </div>
</div>

<style>
  .bg-gold-soft {
    background: rgba(245, 166, 35, 0.1);
  }
</style>
{% endblock %}
