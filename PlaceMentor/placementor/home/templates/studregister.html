{% extends 'base.html' %}
{% load static %}

{% block title %}Student Registration | PlaceMentor{% endblock %}

{% block content %}
<div class="container py-5 animate__animated animate__zoomIn">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card bg-dark2 border border-secondary border-opacity-10 p-4 p-md-5 rounded-4 shadow-lg">
        <div class="text-center mb-5">
          <div class="logo-icon mx-auto mb-4" style="width: 50px; height: 50px; font-size: 1.2rem;">PC</div>
          <h1 class="fw-bold text-light mb-1">Student <span class="text-gold">Registration</span></h1>
          <p class="text-muted">Join the elite recruitment network of Excellence College.</p>
        </div>

        <form method="POST" action="{% url 'studregister' %}">
          {% csrf_token %}
          <div class="row g-4 mb-4">
            <div class="col-md-6 text-start">
              <label class="form-label text-muted small text-uppercase fw-bold">Username</label>
              <input type="text" name="username"
                class="form-control bg-dark border-secondary border-opacity-25 text-light py-2"
                value="{{ username|default:'' }}" placeholder="Choose a username" required>
            </div>
            <div class="col-md-6 text-start">
              <label class="form-label text-muted small text-uppercase fw-bold">Email Address</label>
              <input type="email" name="email"
                class="form-control bg-dark border-secondary border-opacity-25 text-light py-2"
                value="{{ email|default:'' }}" placeholder="Enter your email" required>
            </div>
          </div>

          <div class="row g-4 mb-4">
            <div class="col-md-6 text-start">
              <label class="form-label text-muted small text-uppercase fw-bold">College Name</label>
              <input type="text" name="college_name"
                class="form-control bg-dark border-secondary border-opacity-25 text-light py-2"
                value="{{ college_name|default:'' }}" placeholder="e.g. Excellence College of Engineering" required>
            </div>
            <div class="col-md-6 text-start">
              <label class="form-label text-muted small text-uppercase fw-bold">Branch</label>
              <input type="text" name="branch"
                class="form-control bg-dark border-secondary border-opacity-25 text-light py-2"
                value="{{ branch|default:'' }}" placeholder="e.g. Computer Science" required>
            </div>
          </div>

          <div class="row g-4 mb-4">
            <div class="col-md-6 text-start">
              <label class="form-label text-muted small text-uppercase fw-bold">Current CGPA</label>
              <input type="number" step="0.01" min="0" max="10" name="cgpa"
                class="form-control bg-dark border-secondary border-opacity-25 text-light py-2"
                value="{{ cgpa|default:'' }}" placeholder="0.0 - 10.0" required>
            </div>
            <div class="col-md-6 text-start">
              <label class="form-label text-muted small text-uppercase fw-bold">Phone Number</label>
              <input type="text" name="phone"
                class="form-control bg-dark border-secondary border-opacity-25 text-light py-2"
                value="{{ phone|default:'' }}" placeholder="10-digit number" required>
            </div>
          </div>

          <div class="mb-4 text-start">
            <label class="form-label text-muted small text-uppercase fw-bold">Key Skills (Comma separated)</label>
            <input type="text" name="skills"
              class="form-control bg-dark border-secondary border-opacity-25 text-light py-2"
              value="{{ skills|default:'' }}" placeholder="e.g. Python, Django, React, SQL" required>
          </div>

          <div class="row g-4 mb-5">
            <div class="col-md-6 text-start">
              <label class="form-label text-muted small text-uppercase fw-bold">Password</label>
              <input type="password" name="password"
                class="form-control bg-dark border-secondary border-opacity-25 text-light py-2"
                placeholder="Min. 8 characters" required>
            </div>
            <div class="col-md-6 text-start">
              <label class="form-label text-muted small text-uppercase fw-bold">Confirm Password</label>
              <input type="password" name="password2"
                class="form-control bg-dark border-secondary border-opacity-25 text-light py-2"
                placeholder="Repeat password" required>
            </div>
          </div>

          <button type="submit" class="btn btn-student w-100 py-3 fw-bold fs-5 mb-4">Create My Profile</button>

          <div class="text-center text-muted small">
            Already have an account? <a href="{% url 'studlogin' %}" class="text-gold text-decoration-none">Login
              here</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
