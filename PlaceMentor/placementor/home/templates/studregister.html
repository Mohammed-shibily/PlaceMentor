{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration - PlaceMentor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: url("{% static 'images/placement.webp' %}") no-repeat center center/cover;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(5px);
    }
    .register-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 15px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      padding: 30px;
      width: 100%;
      max-width: 500px;
    }
    .form-control:focus {
      border-color: #007bff;
      box-shadow: 0 0 8px rgba(0,123,255,0.3);
    }
  </style>
</head>
<body>

<div class="register-card">
  <h2 class="text-center mb-3 text-primary">Student Registration</h2>

  {% if messages %}
    {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  {% endif %}

  <form method="POST" action="{% url 'studregister' %}">
    {% csrf_token %}

    <div class="mb-3">
      <label for="username" class="form-label">Username</label>
      <input type="text" class="form-control" id="username" name="username"
             value="{{ username|default:'' }}" placeholder="Enter your username" required>
    </div>

    <div class="mb-3">
      <label for="email" class="form-label">Email Address</label>
      <input type="email" class="form-control" id="email" name="email"
             value="{{ email|default:'' }}" placeholder="Enter your email" required>
    </div>

    <div class="mb-3">
      <label for="roll_no" class="form-label">Roll Number</label>
      <input type="text" class="form-control" id="roll_no" name="roll_no"
             value="{{ roll_no|default:'' }}" placeholder="Enter your roll number" required>
    </div>

    <div class="mb-3">
      <label for="branch" class="form-label">Branch</label>
      <input type="text" class="form-control" id="branch" name="branch"
             value="{{ branch|default:'' }}" placeholder="Enter your branch" required>
    </div>

    <div class="mb-3">
      <label for="cgpa" class="form-label">CGPA</label>
      <input type="number" step="0.01" min="0" max="10" class="form-control"
             id="cgpa" name="cgpa" value="{{ cgpa|default:'' }}" placeholder="Enter your CGPA" required>
    </div>

    <div class="mb-3">
      <label for="phone" class="form-label">Phone Number</label>
      <input type="text" class="form-control" id="phone" name="phone"
             value="{{ phone|default:'' }}" placeholder="Enter your phone number" required>
    </div>

    <div class="mb-3">
      <label for="skills" class="form-label">Skills</label>
      <input type="text" class="form-control" id="skills" name="skills"
             value="{{ skills|default:'' }}" placeholder="Enter your skills (comma separated)" required>
    </div>

    <div class="mb-3">
      <label for="password" class="form-label">Password</label>
      <input type="password" class="form-control" id="password" name="password"
             placeholder="Create a password" required>
    </div>

    <div class="mb-3">
      <label for="password2" class="form-label">Confirm Password</label>
      <input type="password" class="form-control" id="password2" name="password2"
             placeholder="Confirm your password" required>
    </div>

    <button type="submit" class="btn btn-primary w-100">Register</button>
  </form>

  <p class="text-center mt-3">Already registered?
    <a href="{% url 'studlogin' %}" class="text-decoration-none">Login here</a>
  </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
