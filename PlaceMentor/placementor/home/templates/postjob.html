{% extends 'base.html' %}
{% load static %}

{% block title %}Post Job | PlaceMentor{% endblock %}

{% block content %}
<div class="container animate__animated animate__fadeIn">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card bg-dark2 border border-secondary border-opacity-10 p-4 p-md-5 rounded-4 shadow-lg">
        <div class="text-center mb-5">
          <h1 class="display-5 fw-bold mb-3">Post <span class="text-gold">New Job</span></h1>
          <p class="text-muted">Create a new opportunity for aspiring candidates.</p>
        </div>

        <form method="POST">
          {% csrf_token %}
          <div class="mb-4">
            <label class="form-label text-muted small text-uppercase fw-bold">Job Title</label>
            <input type="text" name="title"
              class="form-control bg-dark border-secondary border-opacity-25 text-light py-3"
              placeholder="e.g. Senior Software Engineer" required>
          </div>

          <div class="mb-4">
            <label class="form-label text-muted small text-uppercase fw-bold">Description</label>
            <textarea name="description" class="form-control bg-dark border-secondary border-opacity-25 text-light py-3"
              rows="4" placeholder="Detailed job description and expectations..." required
              style="height: auto;"></textarea>
          </div>

          <div class="row">
            <div class="col-md-6 mb-4">
              <label class="form-label text-muted small text-uppercase fw-bold">Minimum CGPA</label>
              <input type="number" step="0.01" name="eligibility_cgpa"
                class="form-control bg-dark border-secondary border-opacity-25 text-light py-3" placeholder="e.g. 6.5"
                required>
            </div>
            <div class="col-md-6 mb-4">
              <label class="form-label text-muted small text-uppercase fw-bold">Last Date to Apply</label>
              <input type="date" name="last_date"
                class="form-control bg-dark border-secondary border-opacity-25 text-light py-3" required>
            </div>
          </div>

          <div class="mb-5">
            <label class="form-label text-muted small text-uppercase fw-bold">
              <i class="fa-solid fa-bolt-lightning text-gold me-1"></i> Skills Required (Comma separated)
            </label>
            <input type="text" name="skills_required"
              class="form-control bg-dark border-secondary border-opacity-25 text-light py-3"
              placeholder="e.g. Python, Django, SQL" required>
          </div>

          <button type="submit" class="btn btn-student w-100 py-3 fw-bold fs-5">
            <i class="fa-solid fa-paper-plane me-2"></i>Publish Job Posting
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
