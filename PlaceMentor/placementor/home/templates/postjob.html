{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Job | PlaceMentor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
    .navbar { box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .card { border-radius: 15px; }
    .card-header { border-radius: 15px 15px 0 0 !important; }
    .btn-success { font-size: 1.1rem; padding: 12px; transition: 0.3s; }
    .btn-success:hover { background: #198754; transform: scale(1.03); }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">PlaceMentor</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'view_jobs' %}">Jobs</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'hr_applications' %}">Applications</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'logout' %}">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Job Form -->
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-lg border-0">
        <div class="card-header bg-primary text-white text-center">
          <h3 class="mb-0">🚀 Post a New Job</h3>
        </div>
        <div class="card-body p-4">

          {% if messages %}
            {% for message in messages %}
              <div class="alert {% if message.tags %}alert-{{ message.tags }}{% else %}alert-info{% endif %}" role="alert">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}

          <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Job Title</label>
              <input type="text" name="title" class="form-control form-control-lg" placeholder="Enter job title" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Description</label>
              <textarea name="description" class="form-control form-control-lg" rows="4" placeholder="Enter job description" required></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Eligibility CGPA</label>
              <input type="number" step="0.01" name="eligibility_cgpa" class="form-control form-control-lg" placeholder="e.g. 6.5" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Skills Required</label>
              <input type="text" name="skills_required" class="form-control form-control-lg" placeholder="e.g. Python, Django, SQL" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Last Date</label>
              <input type="date" name="last_date" class="form-control form-control-lg" required>
            </div>
            <div class="d-grid">
              <button type="submit" class="btn btn-success btn-lg rounded-pill shadow-sm">
                ✅ Post Job
              </button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
